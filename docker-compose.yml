# Rede interna para comunicação entre os serviços
networks:
  app-network:
    driver: bridge

# Volumes persistentes para o banco de dados
volumes:
  postgres_data:

services:
  # ─────────────────────────────────────────
  # Banco de dados PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: desafio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-desafio_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-desafio_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # Backend NestJS
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desafio_backend
    restart: unless-stopped
    environment:
      # A DATABASE_URL aponta para o serviço 'postgres' dentro da rede Docker
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-desafio_db}
      JWT_SECRET: ${JWT_SECRET:-chave_secreta_dev_trocar_em_producao}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: http://localhost:3000
    ports:
      - '3001:3001'
    volumes:
      # Volume para uploads persistentes entre reinicializações
      - ./backend/uploads:/app/uploads
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # Frontend Next.js
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: desafio_frontend
    restart: unless-stopped
    environment:
      # URL pública da API (acessada pelo browser do usuário)
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - '3000:3000'
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
